{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaborador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        #wrapper {
            display: flex;
            width: 100%;
        }
        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar-heading {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }
        .list-group-item {
            color: #ffffff;
            background-color: #343a40;
            border: none;
        }
        .list-group-item:hover {
            background-color: #bbbbbb;
        }
        .card {
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .header-title {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">{{ colaborador.username }}</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'inicio_colaborador' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'perfil_colaborador' %}" class="list-group-item list-group-item-action">Perfil</a>
                <a href="{% url 'registrar_disponibilidad' %}" class="list-group-item list-group-item-action">Horario Disponibilidad</a>
                <a href="{% url 'horas_reservadas' %}" class="list-group-item list-group-item-action">Horas reservadas</a>
                <a href="{% url 'colaborador' %}" class="list-group-item list-group-item-action">Cerrar sesión</a>
            </div>
        </div>  
        <div id="page-content-wrapper">
            <main class="container py-5 text-center">
                <section class="text-center mb-5">
                    <h1 class="mb-4">Panel de {{ colaborador.fullname }}</h1>
                    <h4 class="mb-4">Servicio: {{ colaborador.servicio }}</h4>
                    <hr>
                </section>
                
                <div class="row justify-content-center g-4">
                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-user fa-4x mb-3 text-primary"></i>
                                <h5 class="card-title">Perfil</h5>
                                <a class="btn btn-primary" href="{% url 'perfil_colaborador' %}">Perfil</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-calendar-alt fa-4x mb-3 text-success"></i>
                                <h5 class="card-title">Horario Disponibilidad</h5>
                                <a class="btn btn-primary" href="{% url 'registrar_disponibilidad' %}">Seleccionar Horario</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-clock fa-4x mb-3 text-warning"></i>
                                <h5 class="card-title">Horas reservadas</h5>
                                <a class="btn btn-primary" href="{% url 'horas_reservadas' %}">Horas reservadas</a>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
