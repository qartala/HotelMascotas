{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio sesión Colaboradores</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{% url 'principal' %}">
        <img width="50px" height="50px" src="https://cdn-icons-png.flaticon.com/512/21/21537.png" alt="">
        <span class="text-warning">Pets </span>Team
      </a>
    </div>
  </nav>

  <main class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="/static/assets/icono_colab.png" alt="Logo" width="100" height="90">
        </div>
        <h2 class="text-center mb-4">Inicio sesión Colaboradores</h2>
        <form method="POST" action="">
          {% csrf_token %}
          <div class="mb-3">
            <input type="text" id="username" name="username" class="form-control" placeholder="Usuario" required>
          </div>
          <div class="mb-3">
            <input type="password" id="password" name="password" class="form-control" placeholder="Contraseña" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Ingresar</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
