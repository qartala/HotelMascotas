{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }

        .sidebar-heading {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .list-group-item {
            color: #ffffff;
            background-color: #343a40;
            border: none;
        }

        .list-group-item:hover {
            background-color: #bbbbbb;
        }

        #page-content-wrapper {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">Administrador</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'vistaAdmin' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'crearOferta' %}" class="list-group-item list-group-item-action">Crear Oferta</a>
                <a href="{% url 'agregarCategoria' %}" class="list-group-item list-group-item-action active">Crear Categoría</a>
                <a href="{% url 'agregarProductos' %}" class="list-group-item list-group-item-action">Agregar Habitación</a>
                <a href="{% url 'listarProducto' %}" class="list-group-item list-group-item-action">Habitaciones</a>
                <a href="{% url 'cerrar_sesion' %}" class="list-group-item list-group-item-action">Cerrar sesion</a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <main class="container py-5 text-center">
                <div class="col-md-6 mx-auto">
                    <div class="modal-content p-4">
                        <h1 class="header-title">Crear Categoría</h1>
                        <form action="" method="POST" class="p-5">
                            {% csrf_token %}
                            

                            <div class="mb-4">
                                <input name="nombre" id="nombre" type="text" class="form-control" placeholder="Nombre de la Categoría"
                                    value="{{ nombre }}" required>
                            </div>

                            <button type="submit" class="btn btn-primary mt-4">Agregar Categoría</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
