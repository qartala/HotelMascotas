{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Ficha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        h1 {
            text-align: center;
            color: hwb(0 6% 94%);
            margin-bottom: 20px;
        }

        form {
            margin: 0;
        }

        .form-field {
            margin-bottom: 15px;
        }

        .form-field label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-field input, 
        .form-field select, 
        .form-field textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }

        .footer a {
            text-decoration: none;
            color: #4CAF50;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        .footer img {
            width: 30px;
            vertical-align: middle;
            margin-left: 5px;
        }
        .navbar {
            background: linear-gradient(to left, rgba(255, 166, 0, 0.89), rgba(8, 8, 8, 0.658));
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            }

        .navbar-nav .nav-link {
        color: white;
        }

        .navbar-nav .nav-link:hover {
        color: rgb(255, 255, 255);
        }
        .navbar-nav .nav-link {
        font-size: 1.2rem;
        font-weight: 500;
        }

        .navbar-brand {
        font-size: 1.5rem;
        font-weight: bold;
        }
        footer {
        background: linear-gradient(to left, rgba(255, 166, 0, 0.89), rgba(8, 8, 8, 0.658));
        backdrop-filter: blur(10px);
        text-align: center;
        padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <nav class="navbar navbar-expand-lg fixed-top">
              <div class="container">
                <a class="navbar-brand" href="#">
                  <img width="50px" height="50px" src="https://cdn-icons-png.flaticon.com/512/21/21565.png" alt="" style="filter: brightness(0) invert(1);">
          
                  <span class="text-white">Pets</span> Team
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                  <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'principalUsuario' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#nosotros">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#colaborador">¿Quieres ser Colaborador?</a></li>
                    <li class="nav-item"><a class="nav-link" href="#services">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#precios">Precios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#membresia">Membresía</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'perfil' %}">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cerrar_sesion' %}">Cerrar sesión</a></li>
                  </ul>
                </div>
              </div>
            </nav>
        </div>
        <div class="row d-flex justify-content-center pt-5">
            <div class="col-8">
                <div class="card">
                    <div class="card-body">
                        <h1>Editar Ficha de Salud</h1>
                        <form method="POST">
                            {% csrf_token %}
                            {% for field in form %}
                                <div class="form-field">
                                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                                    {{ field }} 
                                </div>
                            {% endfor %}
                            <button type="submit">Guardar cambios</button>
                        </form>
                        <div class="footer">
                            <a href="{% url 'listar_fichas' %}">Volver a la lista</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
