{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

    

        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }

        .sidebar-heading {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .list-group-item {
            color: #ffffff;
            background-color: #343a40;
            border: none;
        }

        .list-group-item:hover {
            background-color: #bbbbbb;
        }

        .card {
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .header-title {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">Administrador</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'vistaAdmin' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'agregarProductos' %}" class="list-group-item list-group-item-action">Agregar Habitación</a>
                <a href="{% url 'listarProducto' %}" class="list-group-item list-group-item-action">Habitaciones</a>
                <a href="{% url 'solicitudes_admin' %}" class="list-group-item list-group-item-action">Solicitudes</a>
                <a href="{% url 'listar_colaboradores_aprobados' %}" class="list-group-item list-group-item-action">Colaboradores</a>
                <a href="{% url 'cerrar_sesion' %}" class="list-group-item list-group-item-action">Cerrar sesion</a>
            </div>
        </div>  
        <div id="page-content-wrapper">
            <main class="container py-5 text-center">
                <h1 class="mb-4">Panel de Administrador</h1>
                <div class="row justify-content-center g-4">
        
                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-bed fa-4x mb-3 text-info"></i>
                                <h5 class="card-title">Agregar Habitación</h5>
                                <a class="btn btn-primary" href="{% url 'agregarProductos' %}">Agregar</a>
                            </div>
                        </div>
                    </div>
        
                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-hotel fa-4x mb-3 text-dark"></i>
                                <h5 class="card-title">Habitaciones</h5>
                                <a class="btn btn-primary" href="{% url 'listarProducto' %}">Habitaciones</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-check-circle fa-4x mb-3 text-dark"></i> 
                                <h5 class="card-title">Solicitudes</h5>
                                <a class="btn btn-primary" href="{% url 'solicitudes_admin' %}">Solicitudes</a>
                            </div>
                        </div>
                    </div> 
                    <div class="col-md-4">
                        <div class="card shadow border-light">
                            <div class="card-body text-center">
                                <i class="fas fa-users fa-4x mb-3 text-dark"></i>
                                <h5 class="card-title">Colaboradores</h5>
                                <a class="btn btn-primary" href="{% url 'listar_colaboradores_aprobados' %}">Colaboradores</a>
                            </div>
                        </div>
                    </div>
                    
                    
                </div>
            </main>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
