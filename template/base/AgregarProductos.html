{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Habitación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/carro.css' %}">
    <link rel="icon" href="{% static 'assets/R.png' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>

        body {
            background-color: #f8f9fa;
        }

        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }

        .sidebar-heading {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .list-group-item {
            color: #ffffff;
            background-color: #343a40;
            border: none;
        }

        .list-group-item:hover {
            background-color: #bbbbbb;
        }

        #page-content-wrapper {
            flex: 1;
            padding: 20px;
        }

        .modal-content {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">Administrador</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'principalUsuario' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'agregarProductos' %}" class="list-group-item list-group-item-action active">Agregar Habitación</a>
                <a href="{% url 'listarProducto' %}" class="list-group-item list-group-item-action">Habitaciones</a>
                <a href="{% url 'solicitudes_admin' %}" class="list-group-item list-group-item-action">Solicitudes</a>
                <a href="{% url 'listar_colaboradores_aprobados' %}" class="list-group-item list-group-item-action">Colaboradores</a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <main class="container py-5 text-center">
                <h1 class="mb-4">Agregar Habitación</h1>
                <div class="col-md-8 mx-auto">
                    <div class="modal-content p-5">
                        <form action="" method="POST" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="form-group mb-3">
                                <input type="file" name="imagen_habitacion" id="imagen_habitacion" class="form-control" required>
                            </div>

                            <div class="form-group mb-3">
                                <input name="numero_habitacion" id="numero_habitacion" type="text" class="form-control" placeholder="Numero habitacion" required>
                            </div>
                            
                            <div class="form-group mb-3">
                                <select class="form-select" aria-label="Default select example" name="tipo_habitacion" required>
                                    <option selected disabled>Selecciona tipo de habitacion</option>
                                    <option value="pequena">Pequeña</option>
                                    <option value="mediana">Mediana</option>
                                    <option value="grande">Grande</option>
                                  </select>
                            </div>

                            <div class="input-group form-group mb-3">
                                <input name="precio" id="precio" type="number" class="form-control" min="0" placeholder="Precio" required>
                                <span class="input-group-text">CLP</span>
                            </div>

                            
                            {% if mensaje %}
                                <div class="alert alert-warning" role="alert">{{ mensaje }}</div>
                            {% endif %}

                            <button type="submit" class="btn btn-primary mt-4">Agregar Habitación</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
