{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #0d6efd;
            padding: 15px;
        }

        .navbar-brand span {
            color: #ffffff;
            font-weight: bold;
        }

        .navbar-nav .nav-link {
            color: #fff;
            padding: 10px 20px;
            font-size: 1.1rem;
        }

        .navbar-nav .nav-link:hover {
            color: #ffc107;
        }

        .register-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 600px;
            margin: 0 auto;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 50px;
        }

        .register-left {
            background: linear-gradient(to bottom right, #0066ff, #0099cc);
            width: 50%;
            padding: 50px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .register-left h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .register-left p {
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .register-right {
            background-color: #fff;
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .register-right h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #0066ff;
        }

        .form-control {
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .form-check-input {
            margin-right: 10px;
        }

        .btn-primary {
            background-color: #0066ff;
            border: none;
            padding: 15px;
            font-size: 1rem;
            border-radius: 10px;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #004db3;
        }

        /* Wave background */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: url('https://cdn.jsdelivr.net/gh/abrahamcalfie/svg-wave-top@master/wave.svg') no-repeat;
            background-size: cover;
            z-index: -1;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .register-wrapper {
                flex-direction: column;
                height: auto;
            }

            .register-left,
            .register-right {
                width: 100%;
            }

            .register-left {
                padding: 30px;
            }

            .register-right {
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/21/21565.png" alt="logo" width="40" class="d-inline-block align-text-top" style="filter: brightness(0) invert(1);">
        <span>Pets Team</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'principal' %}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'iniciarsesion' %}">Iniciar sesión</a></li>
          <li class="nav-item"><a class="nav-link" href="#nosotros">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" href="#colaborador">Colaborador</a></li>
          <li class="nav-item"><a class="nav-link" href="#services">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="#precios">Precios</a></li>
          <li class="nav-item"><a class="nav-link" href="#membresia">Membresía</a></li>
          <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>
    <br><br><br><br>

    <!-- Register Section -->
    <div class="register-wrapper">
        <!-- Left section with wave and text -->
        <div class="register-left">
            <h1>¡Únete a Pets Team!</h1>
            <p>Crea una cuenta para disfrutar de todos los beneficios que ofrecemos para tu mascota.</p>
            <div class="wave"></div>
        </div>

        <!-- Right section with register form -->
        <div class="register-right">
            <h2>Registrarse</h2>
            <form method="POST" action="">
                {% csrf_token %}
                <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Usuario" required>
                <input type="text" id="first_name" name="first_name" class="form-control" placeholder="Nombre" required>
                <input type="email" id="correo" name="correo" class="form-control" placeholder="Correo" required>
                <input type="password" id="contrasenia" name="contrasenia" class="form-control" placeholder="Contraseña" required>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1" required>
                    <label class="form-check-label" for="exampleCheck1">De acuerdo con los términos y condiciones</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Registrarse</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
