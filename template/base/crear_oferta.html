{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Oferta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }

        .sidebar-heading {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .list-group-item {
            color: #ffffff;
            background-color: #343a40;
            border: none;
        }

        .list-group-item:hover {
            background-color: #bbbbbb;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .header-title {
            color: #343a40;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        .text-sm-start {
            color: #495057;
            font-weight: 600;
        }

        #page-content-wrapper {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">Administrador</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'principalUsuario' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'crearOferta' %}" class="list-group-item list-group-item-action active">Crear Oferta</a>
                <a href="{% url 'agregarCategoria' %}" class="list-group-item list-group-item-action">Crear Categoría</a>
                <a href="{% url 'agregarProductos' %}" class="list-group-item list-group-item-action">Agregar Habitación</a>
                <a href="{% url 'listarProducto' %}" class="list-group-item list-group-item-action">Habitaciones</a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <main class="container py-5">
                <div class="col-md-8 mx-auto">
                    <div class="modal-content">
                        <form action="" method="POST" class="p-4">
                            {% csrf_token %}
                            <h2 class="header-title text-center">Crear Oferta</h2>

                            <div class="mb-4">
                                <label for="porcentaje" class="text-sm-start">Porcentaje de oferta</label>
                                <input type="number" class="form-control" id="porcentaje" name="porcentaje" placeholder="Ej: 10"
                                    value="{{ porcentaje }}" required>
                            </div>

                            {% if mensaje %}
                                <div class="alert alert-info">{{ mensaje }}</div>
                            {% endif %}

                            <div class="mb-4">
                                <label for="nombre" class="text-sm-start">Nombre de la oferta</label>
                                <input name="nombre" id="nombre" type="text" class="form-control" placeholder="Nombre de la Oferta"
                                    value="{{ nombre }}" required>
                            </div>

                            <div class="mb-4">
                                <label for="f_inicio" class="text-sm-start">Fecha de inicio</label>
                                <input type="date" class="form-control" id="f_inicio" name="f_inicio" value="{{ f_inicio }}" required>
                            </div>

                            <div class="mb-4">
                                <label for="f_termino" class="text-sm-start">Fecha de término</label>
                                <input type="date" class="form-control" id="f_termino" name="f_termino" value="{{ f_termino }}" required>
                            </div>

                            <button type="submit" class="btn btn-primary">Crear Oferta</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% load sweetify %}
    {% sweetify %}
</body>
</html>
