{% extends 'base/usuario/base.html' %}

{% block title %}
Inicio - cliente
{% endblock %}

{% block content %}
<head>
    <style>
        .oculto {
            display: none;
        }
        .navbar {
        background-color: #0d6efd;
        padding: 15px;
        }

        .navbar-brand span {
        color: #ffffff;
        font-weight: bold;
        }

        .navbar-nav .nav-link {
        color: #fff;
        padding: 10px 20px;
        font-size: 1.1rem;
        }

        .navbar-nav .nav-link:hover {
        color: #ffc107;
        }
        body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8f9fa;
        color: #343a40;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        }
        .section {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .section h2 {
            color: #2980b9;
        }
        .field {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 10px;
            border: 1px solid #2980b9;
            border-radius: 4px;
            font-size: 16px;
        }
        .btnGuardar {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        
        footer {
        width: 100;
        background-color: #0d6efd;
        color: #fff;
        padding: 40px 0;
        text-align: center;
        margin-top: auto;
        }

        footer .social-icons a {
        color: #ffc107;
        margin: 0 10px;
        transition: color 0.3s ease-in-out;
        }

        footer .social-icons a:hover {
        color: #fff;
        }

        footer p {
        font-size: 1rem;
        font-weight: 500;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
    </style>
</head>
<form method="POST" enctype="multipart/form-data" action="">
    {% csrf_token %}
      <div class="container">
          <div class="row d-flex justify-content-center pt-5">
              <div class="col-7">
              </div>
          </div>
          <div class="row d-flex justify-content-center pt-5">
              <div class="col-7">
                <div class="card">
                    <div class="section">
                        <h1>Ficha de Salud de la Mascota</h1> 
                        <h2>Información General</h2>
                        <div class="field">
                            <label for="nombre">Nombre del Perro:</label>
                            <input type="text" id="nombre_perro" name="nombre_perro" value="{{ form.nombre_perro.value|default:'' }}" placeholder="Nombre de tu perro" class="form-control" required>

                        </div>
                        {% if user.is_authenticated %}
                        <div class="oculto">
                            <label for="nombre_dueno">dueno</label>
                            <input type="text" id="nombre_dueno" name="nombre_dueno" value="{{user.first_name}}" placeholder="" class="form-control" required>
                        </div>
                        {% endif %}
                        <div class="field">
                            <label for="raza">Raza:</label>
                            <input type="text" id="raza" name="raza" value="{{form.raza.value|default:'' }}" placeholder="Raza del perro" class="form-control" required>
                        </div>
                        <div class="field">
                            <label for="edad">Edad:</label>
                            <input type="number" id="edad" name="edad" value="{{form.edad.value|default:'' }}" placeholder="Edad en años" class="form-control" required>
                        </div>
                        <div class="field">
                            <label for="peso">Peso:</label>
                            <input type="number" id="peso" name="peso" value="{{form.peso.value|default:'' }}" placeholder="Peso en kg" class="form-control" required>
                        </div>
                        <div class="field">
                            <label for="chip">¿Tiene Chip?</label>
                            <select id="chip" name="chip" value="{{form.chip.value}}" class="form-control" required>
                                <option value="">Selecciona...</option>
                                <option value="si">Sí</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="comida">Tipo de Comida:</label>
                            <input type="text" id="comida" name="comida" value="{{form.comida.value|default:'' }}" placeholder="Escribe el tipo de comida" class="form-control" required>
                        </div>
                    </div>
                </div>
              </div>
          </div>
          <div class="row d-flex justify-content-center">
              <div class="col-7">
                <div class="card">
                  <div class="section">
                      <h2>Historial Médico</h2>
                      <div class="field">
                        <label for="vacunas">Vacunas Administradas:</label>
                        <select id="vacunas" name="vacunas" class="form-control" multiple>
                            <option value="ninguna_vacuna">Ninguna</option>
                            <option value="rabia">Vacuna contra la Rabia</option>
                            <option value="parvovirus">Vacuna contra el Parvovirus</option>
                            <option value="moquillo">Vacuna contra el Moquillo</option>
                            <option value="hepatitis">Vacuna contra la Hepatitis</option>
                            <option value="tifus">Vacuna contra el Tifus Canino</option>
                        </select>
                        <button class="btn btn-primary mt-2" type="button" onclick="agregarVacuna()">Agregar a la lista</button>
                    </div>
                    <div class="field">
                        <label for="vacunasTextarea">Vacunas Seleccionadas:</label>
                        <textarea id="vacunasTextarea" name="vacunas" rows="4" class="form-control" placeholder="Ingresa vacunas por tu cuenta, si no se encuentran en la lista"></textarea>
                    </div>

                      <div class="field">
                        <label for="alergias">Alergias:</label>
                        <select id="alergias" name="alergias" class="form-control" multiple>
                            <option value="ninguna_alergia">Ninguna</option>
                            <option value="polen">Alergia al Polen</option>
                            <option value="polvo">Alergia al Polvo</option>
                            <option value="alimentos">Alergia a Alimentos</option>
                        </select>
                        <button class="btn btn-primary mt-2" type="button" onclick="agregarAlergia()">Agregar a la lista</button>
                    </div>
                    <div class="field">
                        <label for="alergiasTextarea">Alergias Seleccionadas:</label>
                        <textarea id="alergiasTextarea" name="alergias" rows="4" class="form-control" placeholder="Ingresa alergias por tu cuenta, si no se encuentran en la lista"></textarea>
                    </div>

                      <div class="field">
                        <label for="enfermedades">Enfermedades:</label>
                        <select id="enfermedades" name="enfermedades" class="form-control" multiple>
                            <option value="ninguna_enfermedad">Ninguna</option>
                            <option value="diabetes">Diabetes</option>
                            <option value="hipotiroidismo">Hipotiroidismo</option>
                            <option value="epilepsia">Epilepsia</option>
                        </select>

                        <button class="btn btn-primary mt-2" type="button" onclick="agregarEnfermedad()">Agregar a la lista</button>
                    </div>
                    
                    <div class="field">
                        <label for="enfermedadesTextarea">Enfermedades Seleccionadas:</label>
                        <textarea id="enfermedadesTextarea" name="enfermedades" rows="4" class="form-control" placeholder="Ingresa enfermedades por tu cuenta, si no se encuentran en la lista"></textarea>
                    </div>
                    
                    <div class="field">
                        <label for="imagen_mascota">Imagen de la mascota:</label>
                        <input type="file" id="imagen_mascota" name="imagen_mascota" class="form-control">
                    </div>
                      <!-- {% if user.is_authenticated %}
                      <div id="" style="display: none;">
                        <input type="number" id="id_usuario" name="id_usuario" value="{{form.id.value}}">
                      </div>
                      {% endif %} -->
                  </div>
                </div>
              </div>
          </div>
          <div class="row d-flex justify-content-center">
              <div class="col-7">
                  <button href="{% url 'perfil' %}" class="btnGuardar mb-3" type="submit">Guardar Ficha de Salud</button>
              </div>
          </div>
        </div>
    </form>
  
      <script>
        function agregarVacuna() {
            var select = document.getElementById("vacunas");
            var textarea = document.getElementById("vacunasTextarea");
            var selectedValues = Array.from(select.selectedOptions).map(option => option.text);

            selectedValues.forEach(value => {
                if (!textarea.value.includes(value)) {
                    textarea.value += value + "\n"; 
                }
            });
}

        function agregarAlergia() {
            var select = document.getElementById("alergias");
            var textarea = document.getElementById("alergiasTextarea");
            var selectedValues = Array.from(select.selectedOptions).map(option => option.text);
    
            selectedValues.forEach(value => {
                if (!textarea.value.includes(value)) {
                    textarea.value += value + "\n";
                }
            });
        }

        function agregarEnfermedad() {
            var select = document.getElementById("enfermedades");
            var textarea = document.getElementById("enfermedadesTextarea");
            var selectedValues = Array.from(select.selectedOptions).map(option => option.text);
    
            selectedValues.forEach(value => {
                if (!textarea.value.includes(value)) {
                    textarea.value += value + "\n"; 
                }
            });
        }

    </script>

{% endblock %}
