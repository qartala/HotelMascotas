{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/carro.css' %}">
    <link rel="stylesheet" href="{% static 'css/carrito.css' %}">
    <link rel="stylesheet" href="{% static 'css/style_carro.css' %}">
    <link rel="icon" href="{% static 'assets/R.png' %}">
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 50px;
        }

        .form-label {
            font-weight: bold;
        }

        .btn-custom {
            border: none;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn-save {
            background-color: #17a2b8;
        }

        .btn-save:hover {
            background-color: #138496;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <section class="text-center mb-5">
            <h2 class="mb-4">Modificar Producto: {{ producto.descripcion }}</h2>
            <hr class="w-25 mx-auto">
        </section>

        <section class="form-container">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="numero_habitacion" class="form-label">Numero Habitacion</label>
                    <input type="text" id="numero_habitacion" name="numero_habitacion" class="form-control" value="{{ producto.numero_habitacion }}" required>
                </div>
                <div class="mb-3">
                    <label for="kilos" class="form-label">Tipo Habitacion</label>
                    <input type="text" id="tipo_habitacion" name="tipo_habitacion" class="form-control" value="{{ producto.tipo_habitacion }}" required>
                </div>
                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" id="precio" name="precio" class="form-control" value="{{ producto.precio }}" required>
                </div>
                <div class="mb-3">
                    <label for="imagen" class="form-label">Imagen</label>
                    <input type="file" id="imagen" name="imagen" class="form-control">
                </div>
                <button type="submit" class="btn btn-custom btn-save">Guardar Cambios</button>
            </form>
        </section>
    </div>

    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% load sweetify %}
    {% sweetify %}
</body>

</html>
