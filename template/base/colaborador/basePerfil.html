{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Perfil{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        /* Sidebar Styling */
        #wrapper {
            display: flex;
            width: 100%;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            background-color: #0d6efd;
            color: white;
            padding-top: 20px;
        }

        .sidebar-heading {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            color: white;
        }

        .list-group-item {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
        }

        .list-group-item:hover {
            background-color: #0069d9;
            color: #fff;
        }

        /* Content Area */
        #page-content-wrapper {
            width: 100%;
            padding: 30px;
        }

        .card {
            border-radius: 15px;
            transition: transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 25px;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            margin-top: 15px;
            font-weight: 600;
            color: #0d6efd;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .fas {
            color: #0d6efd;
        }

        h1 {
            color: #0d6efd;
            font-weight: 700;
        }
        
    </style>
</head>

<body>

    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">Administrador</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'inicio_colaborador' %}" class="list-group-item list-group-item-action">Inicio</a>
                <a href="{% url 'perfil_colaborador' %}" class="list-group-item list-group-item-action">Perfil</a>
                <a href="{% url 'registrar_disponibilidad' %}" class="list-group-item list-group-item-action">Horario Disponibilidad</a>
                <a href="{% url 'horas_disponibles' %}" class="list-group-item list-group-item-action">Horas disponibles</a>
                <a href="{% url 'colaborador' %}" class="list-group-item list-group-item-action">Cerrar sesión</a>
            </div>
        </div>
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <main class="container py-5 text-center">
                {% block content %}
                {% endblock %}
            </main>
        </div>

    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% load sweetify %}
    {% sweetify %}
</body>

</html>
